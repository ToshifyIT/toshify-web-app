# CI/CD Pipeline Lineal
# BUILD → MERGE STAGING → MERGE MAIN → DEPLOY
# (Aprobaciones comentadas para deploys rapidos)

name: CI/CD Pipeline

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
    types: [closed]

# Cancelar runs anteriores del mismo branch cuando hay un nuevo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  # PASO 1: Build & Validate
  # ═══════════════════════════════════════════
  build:
    name: "1. Build"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ═══════════════════════════════════════════
  # PASO 2: Aprobación para Staging (COMENTADO)
  # ═══════════════════════════════════════════
  # approval-staging:
  #   name: "2. Approval Staging"
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: staging
  #   steps:
  #     - run: echo "✅ Aprobado para Staging"

  # ═══════════════════════════════════════════
  # PASO 2: Merge a Staging (directo tras build)
  # ═══════════════════════════════════════════
  merge-staging:
    name: "2. Merge Staging"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Merge development → staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin staging
          git checkout staging
          git merge origin/development -m "chore: merge development → staging [skip ci]"
          git push origin staging

  # ═══════════════════════════════════════════
  # PASO 3: Aprobación para Producción (COMENTADO)
  # ═══════════════════════════════════════════
  # approval-production:
  #   name: "4. Approval Prod"
  #   needs: merge-staging
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: production
  #   steps:
  #     - run: echo "✅ Aprobado para Producción"

  # ═══════════════════════════════════════════
  # PASO 3: Merge a Main + Deploy (directo tras staging)
  # ═══════════════════════════════════════════
  merge-main:
    name: "3. Merge Main + Deploy"
    needs: merge-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Merge staging → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout main
          git merge origin/staging -m "chore: merge staging → main"
          git push origin main
      - name: Trigger Dokploy Deploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
          echo "🚀 Deploy triggered en Dokploy"
