# CI/CD Pipeline Lineal
# BUILD → APROBACIÓN → MERGE STAGING → MERGE MAIN → DEPLOY
# Ningún merge avanza a staging/main sin aprobación en el environment Production

name: CI/CD Pipeline

on:
  push:
    branches: [development]

# Cancelar runs anteriores del mismo branch cuando hay un nuevo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  # PASO 1: Build & Validate
  # ═══════════════════════════════════════════
  build:
    name: "1. Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ═══════════════════════════════════════════
  # PASO 2: Aprobación (revisores del environment Production)
  # ═══════════════════════════════════════════
  approval:
    name: "2. Aprobación"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
      - run: echo "✅ Aprobado — continúa el merge a staging, main y deploy"

  # ═══════════════════════════════════════════
  # PASO 3: Merge a Staging (tras aprobación)
  # ═══════════════════════════════════════════
  merge-staging:
    name: "3. Merge Staging"
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Merge development → staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin staging
          git checkout staging
          git merge origin/development -m "chore: merge development → staging [skip ci]"
          git push origin staging

  # ═══════════════════════════════════════════
  # PASO 4: Merge a Main + Deploy
  # ═══════════════════════════════════════════
  merge-main:
    name: "4. Merge Main + Deploy"
    needs: merge-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Merge staging → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout main
          git merge origin/staging -m "chore: merge staging → main"
          git push origin main
      - name: Trigger Dokploy Deploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
          echo "🚀 Deploy triggered en Dokploy"
